name: restaurant_tour
description: Flutter developer coding challenge starter project.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.19.6"

dependencies:
  core: ^0.0.1
  flutter:
    sdk: flutter
  home: ^0.0.1
  http: ^1.2.2
  i18n: ^0.0.1
  lottie: ^3.1.3

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/animations/
    - ../.env
  fonts:
    - family: Lora
      fonts:
        - asset: common/design_system/fonts/Lora/Lora-Regular.ttf
          weight: 400
        - asset: common/design_system/fonts/Lora/Lora-Medium.ttf
          weight: 500
        - asset: common/design_system/fonts/Lora/Lora-SemiBold.ttf
          weight: 600
        - asset: common/design_system/fonts/Lora/Lora-Bold.ttf
          weight: 700
    - family: OpenSans
      fonts:
        - asset: common/design_system/fonts/OpenSans/OpenSans-Regular.ttf
          weight: 400
        - asset: common/design_system/fonts/OpenSans/OpenSans-Italic.ttf
          style: italic
        - asset: common/design_system/fonts/OpenSans/OpenSans-SemiBold.ttf
          weight: 600
